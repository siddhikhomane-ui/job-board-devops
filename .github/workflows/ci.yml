name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Setup Node.js (Frontend)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. Install Frontend Dependencies
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      # 4. Build Frontend
      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      # 5. Setup Python (Backend)
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 6. Install Backend Dependencies
      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      # 7. Run Backend Check (optional)
      - name: Run Backend
        run: |
          cd backend
          python main.py || echo "Backend run skipped"

      # 8. SonarQube Scan 🔥
      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}